name: Deploy Browserbase Functions

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Browserbase CLI
        run: pnpm add -g @browserbasehq/sdk-functions

      - name: Deploy functions
        run: bb publish index.ts
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}

      - name: Update CF Worker function IDs
        run: node scripts/update-function-ids.mjs --remote
        env:
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Output summary
        run: |
          echo "## Deployed Function IDs" >> $GITHUB_STEP_SUMMARY
          node -e "
            const ids = JSON.parse(process.env.FUNCTION_IDS || '{}');
            for (const [k, v] of Object.entries(ids)) {
              console.log('- **' + k + '**: \`' + v + '\`');
            }
          " >> $GITHUB_STEP_SUMMARY || echo "See update-function-ids output for details" >> $GITHUB_STEP_SUMMARY
